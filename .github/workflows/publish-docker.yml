name: Publish Docker Image to GHCR

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = kvm

      - name: Build Docker image with Nix
        run: |
          nix build ./docker#dockerImage --out-link /tmp/crtb-docker-image
          docker load < /tmp/crtb-docker-image

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/crafters-toolbox
          docker tag crafters-toolbox:latest ${IMAGE_NAME}:latest

          # タグプッシュ時はバージョンタグも付ける
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            docker tag crafters-toolbox:latest ${IMAGE_NAME}:${VERSION}
            docker push ${IMAGE_NAME}:${VERSION}
          fi

          docker push ${IMAGE_NAME}:latest
